name: inference
version: v1
type: custom
config:
  bash:
    # Turn off auto-scanning the output dir's subdirs for artifacts; run.py
    # explicitly registers the `generation` output.
    skip_finding_output_artifacts: true

# I/O schema — validated against the build.yaml target at build time.
inputs:
  allow_unknown: false
  required:
    # The model to run. Declared in the target's `inputs.model`; gbserver
    # downloads it and exposes its local path to the script as
    # $LLMB_BASH_INPUT_MODEL (see docs/operators/bash-environment.md).
    model:
      type: model
      accept: [uri, binding]
outputs:
  # The script emits the `generation` artifact dynamically via
  # `LLMB_ARTIFACT_ID:generation ...`; allow_unknown keeps that valid.
  allow_unknown: true
  optional:
    generation:
      type: fileset

environment_configs:
  Bash:
    launchers:
      inference:
        # No `script_path`: the launcher defaults to command.sh, which builds a
        # dedicated venv and execs run.py in it (the nohup launcher's sanitized
        # PATH-less env makes a bare `#!/usr/bin/env python3` shebang unreliable).
        # No launcher `env:` either: a launcher env would WIN over build.yaml's
        # `config.bash.env` (see Bash.launch_nohup) and defeat per-build
        # overrides. Set step parameters in build.yaml under `config.bash.env`;
        # the script defaults each via os.environ.get(...):
        #   PROMPT ("what is the best ibm office location"), MAX_NEW_TOKENS (512).
        type: nohup
        monitors:
          - log_monitor
    monitors:
      log_monitor:
        type: log_monitor
        config:
          event_configs:
            # Register the generation output as an artifact
            - event_type: NEWARTIFACT_IN_ENVIRONMENT_EVENT
              line_regex: "LLMB_ARTIFACT_ID:.* LLMB_ARTIFACT_PATH:.*"
              is_json: false
              event_fields:
                - field_name: binding_id
                  field_regex: "(?<=LLMB_ARTIFACT_ID:)[^ ]+"
                - field_name: path
                  field_regex: "(?<=LLMB_ARTIFACT_PATH:).*"
                  is_data: true
                - field_name: binding
                  field_value_template: '{ "path": "{{ fields.data.path }}" }'
                  is_json: true
            # Stream every other line to the build log
            - event_type: MESSAGE_EVENT
              line_regex: ".*"
              is_json: false
              event_fields:
                - field_name: msg
                  field_regex: ".*"
