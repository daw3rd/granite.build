name: sky-slurm
type: Skypilot
config:
  default_cloud: slurm
  idle_minutes_to_autostop: 0
  cluster: slurm-docker
  zone: normal
  shared_workdir: /shared
  # Inline cluster SSH config — gbserver materializes this into ~/.slurm/config
  # at launch time (setup-slurm.sh no longer writes it). Keys are the exact
  # OpenSSH directive names, mirroring ~/.slurm/config 1:1. The referenced key is
  # generated on the host by `make slurm-setup`. The `Host` alias must match the
  # `cluster:` field above (SkyPilot provisions on infra=slurm/slurm-docker).
  cluster_ssh_configs:
    slurm:
      - Host: slurm-docker
        HostName: 127.0.0.1
        User: root
        Port: 2222
        IdentityFile: ~/.ssh/slurm_docker_key
        StrictHostKeyChecking: "no"
        UserKnownHostsFile: /dev/null
assetstores:
  - store_uri: space://assetstores/hf
    load:
      - mode: hf_pull
        config:
          cache_path: /shared/hf_cache
    push:
      - mode: hf_push
