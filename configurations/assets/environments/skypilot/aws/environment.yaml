name: skypilot-standalone
type: Skypilot
config:
  # Uncomment ONE of the following cloud backends:

  # AWS — provisions EC2 instances directly (requires ~/.aws/credentials)
  default_cloud: aws

  # Kubernetes — uses existing K8s cluster (requires ~/.kube/config)
  # default_cloud: kubernetes

  idle_minutes_to_autostop: 5
  retry:
    max_retries: 10
    delay_seconds: 1800
assetstores:
  - store_uri: space://assetstores/s3/
    load:
      - mode: default
        config: {}
    push:
      - mode: default
        config: {}
  - store_uri: space://assetstores/env-local
    load:
      - mode: env_local
        config: {}
    push:
      - mode: env_local
        config: {}
  - store_uri: space://assetstores/hf
    load:
      - mode: hf_pull
        config:
          cache_path: /tmp/hf_cache
          inline: true
    push:
      - mode: hf_push
        config: {}
