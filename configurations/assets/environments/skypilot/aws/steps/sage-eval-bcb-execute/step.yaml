name: sage-eval-bcb-execute
version: 1.0.0
type: EVAL
config:
  workload:
    cwd: "."
  gb:
    mock: false
    step_contents_in_env: false
  sage_eval_config:
    gb_script: "code_olmes_bigcodebench_slim.sh"
    model_source_s3: ""
    eval_results_s3: "s3://granite-build-eval-results"
    experiment: "eval-bcb-exec"
    batch_size: 4
    max_length: 4096
    num_gpus: 1
    oe_eval_bcb_api_url: "http://localhost:7860/evaluate/"
outputs:
  optional:
    sage_eval_results:
      type: dataset

environment_configs:
  Skypilot:
    default_launcher: sage-eval-bcb-execute
    launchers:
      sage-eval-bcb-execute:
        type: skypilot
        monitors:
        - skypilot_monitor
        config:
          image_id: "docker:022767362696.dkr.ecr.us-east-2.amazonaws.com/granite-build/sage-py311-olmes:0.025"
          docker:
            run_options:
              - "-e HOME=/root"
          resources:
            infra: aws/us-east-2
            # CPU-only: high memory for code execution sandboxes.
            # lm_eval vllm import is patched out via sed below.
            instance_type: "r6i.12xlarge"
            cpus: "48+"
            memory: "384+"
            disk_size: 256
          file_mounts:
            /model:
              source: "{{ config.sage_eval_config.model_source_s3 }}"
              mode: COPY
            /output:
              source: "{{ config.sage_eval_config.eval_results_s3 }}"
              mode: MOUNT
          envs:
            SKYPILOT_DOCKER_USERNAME: "AWS"
            SKYPILOT_DOCKER_SERVER: "022767362696.dkr.ecr.us-east-2.amazonaws.com"
            GB_SCRIPT: "{{ config.sage_eval_config.gb_script }}"
            EVAL_NAME: "code-olmes-bigcodebench"
            EVAL_CATEGORY: "code"
            EXPERIMENT: "{{ config.sage_eval_config.experiment }}"
            MODEL_PATH: "/model"
            NUM_GPUS: "{{ config.sage_eval_config.num_gpus }}"
            BATCH_SIZE: "{{ config.sage_eval_config.batch_size }}"
            MAX_LENGTH: "{{ config.sage_eval_config.max_length }}"
            HF_HOME: "/workspace/.cache/huggingface"
            OUTPUT_BASE_PATH: "/output/sage"
            OE_EVAL_BCB_API_URL: "{{ config.sage_eval_config.oe_eval_bcb_api_url }}"
          setup: |
            echo "=== Environment Check ==="
            python -c "import sys; print(f'Python {sys.version}')"
            echo "CPU-only instance for code execution"

            # Patch out lm_eval import that triggers vllm/CUDA dependency chain
            sed -i 's/^from lm_eval.api.instance import Instance as EleutherInstance$/EleutherInstance = None  # patched: no lm_eval on CPU/' \
              /workspace/olmes/oe_eval/tasks/eleuther_task.py

            # Patch oe-eval to always check for cached predictions (not just with --recompute-metrics)
            # This skips model loading when predictions.jsonl already exists.
            sed -i 's/if compute_config\["recompute_metrics"\]:/if True:  # patched: always check for cached predictions/' \
              /workspace/olmes/oe_eval/run_eval.py

            # Increase base HTTP timeout for code execution batches (120s → 240s)
            sed -i 's/timeout: float = 120/timeout: float = 240/' \
              /workspace/olmes/oe_eval/metrics/code_evals/code_execution_remote.py

            # Install more_itertools if missing (transitive dep of lm_eval)
            pip install --no-cache-dir more_itertools 2>/dev/null || true

            if [[ -n "${HF_TOKEN}" ]]; then
              huggingface-cli login --token "${HF_TOKEN}"
            fi
          run: |
            export HF_HOME=${HF_HOME}

            # ── Wait for BCB evaluator sidecar ──
            BCB_HEALTH_URL="${OE_EVAL_BCB_API_URL%/evaluate/}/health"
            echo "[$(date)] Waiting for BCB evaluator at ${BCB_HEALTH_URL} ..."
            for i in $(seq 1 300); do
              if curl -sf "$BCB_HEALTH_URL" > /dev/null 2>&1; then
                echo "[$(date)] BCB evaluator is ready!"
                break
              fi
              if [[ $i -eq 300 ]]; then
                echo "[$(date)] ERROR: BCB evaluator not ready after 10 minutes. Exiting."
                exit 1
              fi
              sleep 2
            done

            # ── Run execution phase with --recompute-metrics ──
            cd /workspace/sage

            [[ -n "${HF_TOKEN}" ]] && sage set hf-token "${HF_TOKEN}"
            export OUTPUT_PATH=${OUTPUT_BASE_PATH}/${EXPERIMENT}
            sage set setup-dir /tmp/setup-dir
            sage set scripts-dir ${OUTPUT_PATH}/scripts-dir
            # Use local logs-dir (tee writes break on S3 FUSE mounts entirely)
            sage set logs-dir /tmp/sage-logs-dir

            export EXPERIMENT NUM_GPUS BATCH_SIZE MAX_LENGTH MODEL_PATH OUTPUT_BASE_PATH OE_EVAL_BCB_API_URL

            echo "[$(date)] Running BCB execution phase"
            echo "[$(date)] Model: ${MODEL_PATH}"
            echo "[$(date)] BCB API: ${OE_EVAL_BCB_API_URL}"
            echo "[$(date)] Output: ${OUTPUT_PATH}"

            # Verify predictions exist from generate phase
            PRED_FILE=$(find "$OUTPUT_PATH" -name "*predictions.jsonl" -print -quit)
            if [[ -z "$PRED_FILE" ]]; then
              echo "[$(date)] ERROR: No predictions.jsonl found. Run generate phase first."
              exit 1
            fi
            echo "[$(date)] Found predictions: ${PRED_FILE}"

            # oe-eval auto-detects cached predictions and skips generation
            bash /workspace/sage/sage/cluster/gb/scripts/${GB_SCRIPT} \
              2>&1 | tee /tmp/${EVAL_NAME}-execute.log

            echo "$(date)" > ${OUTPUT_PATH}/${EVAL_NAME}.done
            echo "[$(date)] Execution phase complete: ${EVAL_NAME}"

            # Emit artifact for gbserver
            RESULT_FILE=$(find "$OUTPUT_PATH" -type f -name '*-metrics.json' -print -quit 2>/dev/null)
            if [ -z "$RESULT_FILE" ]; then
              RESULT_FILE=$(find "$OUTPUT_PATH" -type f \( -name 'results*.json' -o -name 'metrics*.json' -o -name 'metrics*.jsonl' \) -print -quit 2>/dev/null || true)
            fi
            if [ -n "$RESULT_FILE" ]; then
              echo "LLMB_ARTIFACT_ID:sage_eval_results LLMB_ARTIFACT_PATH:${RESULT_FILE}"
            else
              echo "WARNING: No results file found in $OUTPUT_PATH"
            fi
          post_launch_task:
            run: |
              set -e
              echo "=== Starting BCB evaluator sidecar on host ==="

              DOCKER_CMD="docker"
              if ! command -v docker &> /dev/null; then
                if command -v sudo &> /dev/null; then
                  DOCKER_CMD="sudo docker"
                else
                  echo "ERROR: docker not found in PATH"
                  exit 1
                fi
              fi

              if [[ -n "${SKYPILOT_DOCKER_PASSWORD}" ]]; then
                echo "Logging into ECR..."
                echo "${SKYPILOT_DOCKER_PASSWORD}" | $DOCKER_CMD login -u "${SKYPILOT_DOCKER_USERNAME}" --password-stdin "${SKYPILOT_DOCKER_SERVER}"
              fi

              echo "Pulling BCB evaluator image..."
              $DOCKER_CMD pull 022767362696.dkr.ecr.us-east-2.amazonaws.com/granite-build/oe-eval-bcb-lite-evaluator:0.01

              echo "Starting sidecar container..."
              $DOCKER_CMD run -d --name bcb-evaluator --network host \
                --memory=200g --pids-limit=4096 \
                022767362696.dkr.ecr.us-east-2.amazonaws.com/granite-build/oe-eval-bcb-lite-evaluator:0.01

              echo "Waiting for sidecar to be ready..."
              for i in $(seq 1 30); do
                if curl -sf "http://localhost:7860/health" > /dev/null 2>&1; then
                  echo "BCB evaluator sidecar is ready!"
                  break
                fi
                if [ $i -eq 30 ]; then
                  echo "ERROR: BCB evaluator sidecar failed to start"
                  $DOCKER_CMD logs bcb-evaluator || true
                  exit 1
                fi
                sleep 1
              done

              # Host-level memory watchdog: monitors system memory and restarts
              # bcb-evaluator when sandbox children exhaust RAM. Runs on the host
              # so it has visibility into all containers and can manage them.
              MEM_CEILING_KB=$((200 * 1024 * 1024))
              BCB_IMAGE="022767362696.dkr.ecr.us-east-2.amazonaws.com/granite-build/oe-eval-bcb-lite-evaluator:0.01"
              echo "[$(date)] Starting host memory watchdog (ceiling: 200GB)"
              while true; do
                used_kb=$(awk '/MemTotal/{t=$2} /MemAvailable/{a=$2} END{print t-a}' /proc/meminfo)
                used_gb=$(($used_kb / 1024 / 1024))
                if [[ $used_kb -gt $MEM_CEILING_KB ]]; then
                  echo "[$(date)] WATCHDOG: ${used_gb}GB > 200GB — restarting bcb-evaluator"
                  $DOCKER_CMD kill bcb-evaluator 2>/dev/null || true
                  $DOCKER_CMD rm -f bcb-evaluator 2>/dev/null || true
                  sleep 5
                  echo "[$(date)] WATCHDOG: memory after kill: $(awk '/MemAvailable/{printf "%.0fGB available", $2/1024/1024}' /proc/meminfo)"
                  $DOCKER_CMD run -d --name bcb-evaluator --network host --memory=200g --pids-limit=4096 "$BCB_IMAGE"
                  # Wait for sidecar to recover
                  for i in $(seq 1 30); do
                    curl -sf "http://localhost:7860/health" > /dev/null 2>&1 && break
                    sleep 1
                  done
                  echo "[$(date)] WATCHDOG: bcb-evaluator restarted"
                fi
                sleep 10
              done &
    monitors:
      skypilot_monitor:
        type: skypilot_monitor
        config:
          poll_interval_seconds: 30
          event_configs:
          - event_type: WORKLOAD_STATUS_EVENT
            line_regex: "BCB evaluator is ready|Running BCB execution|Execution phase complete"
            event_fields:
              - field_name: status
                field_value_template: "RUNNING"
              - field_name: message
                field_regex: ".+"
                is_data: True
          - event_type: WORKLOAD_STATUS_EVENT
            line_regex: "ray\\.exceptions\\.OutOfMemoryError|Task was killed due to the node running low on memory"
            event_fields:
              - field_name: status
                field_value_template: "FAILED"
              - field_name: message
                field_regex: ".+"
                is_data: True
          - event_type: NEWARTIFACT_IN_ENVIRONMENT_EVENT
            line_regex: "LLMB_ARTIFACT_ID:.+LLMB_ARTIFACT_PATH:.+"
            event_fields:
              - field_name: binding_id
                field_regex: "(?<=LLMB_ARTIFACT_ID:)[^ ]+"
              - field_name: path
                field_regex: "(?<=LLMB_ARTIFACT_PATH:).*"
                is_data: true
              - field_name: binding
                field_value_template: '{ "path": "{{ fields.data.path }}" }'
                is_json: true
