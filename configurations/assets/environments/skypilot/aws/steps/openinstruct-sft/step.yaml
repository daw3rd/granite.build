name: openinstruct-sft
version: v1
type: custom
config:
  sft_config:
    build_name: "sft"
    model_path: "ibm-granite/granite-4.0-350m-base"
    hf_token: ""
    dataset_s3_uri: "s3://granite-build-datasets/tokenized/8192/data_filtered_10k"
    #dataset_s3_uri: "s3://granite-build-datasets/tokenized/8192/data_filtered"
    checkpoint_s3_uri: "s3://granite-build-checkpoints"
    num_epochs: "3"
    per_device_train_batch_size: "1"
    gradient_accumulation_steps: "16"
    #per_device_train_batch_size: "2"
    #gradient_accumulation_steps: "8"
    learning_rate: "1e-5"
    max_seq_len: "8192"
    lr_scheduler_type: "linear"
    warmup_ratio: "0.03"
    weight_decay: "0.0"
    clip_grad_norm: "1.0"
    reduce_loss: "sum"
    mixed_precision: "bf16"
    seed: "123"
    checkpointing_steps: "epoch"
    #checkpointing_steps: "2500"
    keep_last_n_checkpoints: "5"
    use_flash_attn: "false"
    gradient_checkpointing: "true"
    use_fast: "true"
    padfree: "true"
    torch_compile: "false"
    acc_config_file: "/stage/configs/fsdp_accelerate_mamba.yaml"
    with_tracking: "false"
    report_to: "wandb"
    wandb_project: "granite-sft-aws"
    wandb_api_key: ""
    logging_steps: "1"
    short_name: "g4-350m-sft-8k"
inputs:
  optional:
    model:
      type: model
      accept: [uri, binding]
outputs:
  optional:
    checkpoint:
      type: model
    final:
      type: model
environment_configs:
  Skypilot:
    default_launcher: openinstruct-sft
    launchers:
      openinstruct-sft:
        type: skypilot
        monitors:
        - skypilot_monitor
        config:
          image_id: "docker:022767362696.dkr.ecr.us-east-2.amazonaws.com/granite-build/open-instruct-tuning:0.1.0-conda"
          resources:
            infra: aws/us-east-2
            accelerators: "A10G:1"
            memory: "64+"
            #accelerators: "A10G:8"
            #accelerators: "L40S:8"
            disk_size: 256
            #use_spot: true
          file_mounts:
            /data/datasets:
              source: "{{ config.sft_config.dataset_s3_uri }}"
              mode: COPY
            /output:
              source: "{{ config.sft_config.checkpoint_s3_uri }}"
              mode: MOUNT
          envs:
            SKYPILOT_DOCKER_USERNAME: "AWS"
            SKYPILOT_DOCKER_SERVER: "022767362696.dkr.ecr.us-east-2.amazonaws.com"
            MODEL_PATH: "{{ config.sft_config.model_path }}"
            HF_TOKEN: "{{ config.sft_config.hf_token }}"
            TOKENIZED_DATA_PATH: "/data/datasets"
            OUTPUT_DIR: "/output/{{ config.sft_config.build_name }}"
            NUM_EPOCHS: "{{ config.sft_config.num_epochs }}"
            PER_DEVICE_TRAIN_BATCH_SIZE: "{{ config.sft_config.per_device_train_batch_size }}"
            GRADIENT_ACCUMULATION_STEPS: "{{ config.sft_config.gradient_accumulation_steps }}"
            LR: "{{ config.sft_config.learning_rate }}"
            MAX_SEQ_LEN: "{{ config.sft_config.max_seq_len }}"
            LR_SCHEDULER_TYPE: "{{ config.sft_config.lr_scheduler_type }}"
            WARMUP_RATIO: "{{ config.sft_config.warmup_ratio }}"
            WEIGHT_DECAY: "{{ config.sft_config.weight_decay }}"
            CLIP_GRAD_NORM: "{{ config.sft_config.clip_grad_norm }}"
            REDUCE_LOSS: "{{ config.sft_config.reduce_loss }}"
            MIXED_PRECISION: "{{ config.sft_config.mixed_precision }}"
            SEED: "{{ config.sft_config.seed }}"
            CHECKPOINTING_STEPS: "{{ config.sft_config.checkpointing_steps }}"
            KEEP_LAST_N_CHECKPOINTS: "{{ config.sft_config.keep_last_n_checkpoints }}"
            USE_FLASH_ATTN: "{{ config.sft_config.use_flash_attn }}"
            GRADIENT_CHECKPOINTING: "{{ config.sft_config.gradient_checkpointing }}"
            USE_FAST: "{{ config.sft_config.use_fast }}"
            PADFREE: "{{ config.sft_config.padfree }}"
            TORCH_COMPILE: "{{ config.sft_config.torch_compile }}"
            ACC_CONFIG_FILE: "{{ config.sft_config.acc_config_file }}"
            WITH_TRACKING: "{{ config.sft_config.with_tracking }}"
            REPORT_TO: "{{ config.sft_config.report_to }}"
            WANDB_PROJECT: "{{ config.sft_config.wandb_project }}"
            WANDB_API_KEY: "{{ config.sft_config.wandb_api_key }}"
            LOGGING_STEPS: "{{ config.sft_config.logging_steps }}"
            SHORT_NAME: "{{ config.sft_config.short_name }}"
          setup: |
            source deactivate 2>/dev/null || true
            export PATH=/opt/miniconda3/bin:$PATH

            sed -i 's/keep_in_memory=True/keep_in_memory=False/g' /stage/open_instruct/finetune.py
            sed -i 's/keep_in_memory=True/keep_in_memory=False/g' /stage/open_instruct/dataset_transformation.py

            # Create single-GPU accelerate config (no FSDP overhead)
            cat > /stage/configs/single_gpu_accelerate.yaml <<'ACCEOF'
            compute_environment: LOCAL_MACHINE
            distributed_type: 'NO'
            mixed_precision: bf16
            num_processes: 1
            num_machines: 1
            main_training_function: main
            ACCEOF

            echo "=== Environment Check ==="
            python -c "import torch; print(f'PyTorch {torch.__version__}, CUDA {torch.version.cuda}, GPUs: {torch.cuda.device_count()}')"
            python -c "import flash_attn; print(f'flash-attn {flash_attn.__version__}')"
            nvidia-smi --query-gpu=name,memory.total --format=csv,noheader

            if [[ -n "${HF_TOKEN}" ]]; then
              huggingface-cli login --token "${HF_TOKEN}"
            fi

            # If MODEL_PATH is a local directory (from hfpull binding), skip download
            if [[ -d "${MODEL_PATH}" ]]; then
              echo "Model already available at local path: ${MODEL_PATH}"
            else
              python -c "from huggingface_hub import snapshot_download; snapshot_download('${MODEL_PATH}', ignore_patterns=['*.gguf']); print('Model downloaded successfully')"
            fi

            if [[ -n "${WANDB_API_KEY}" ]]; then
              pip install wandb -q 2>/dev/null || true
              wandb login "${WANDB_API_KEY}" 2>/dev/null || true
            fi
          run: |
            set -eo pipefail
            source deactivate 2>/dev/null || true
            export PATH=/opt/miniconda3/bin:$PATH
            export PYTHONPATH=/stage:$PYTHONPATH
            cd /stage

            NUM_GPUS=$SKYPILOT_NUM_GPUS_PER_NODE
            # Use single-GPU config (no FSDP) when running with 1 GPU
            if [[ "${NUM_GPUS}" -eq 1 ]]; then
              ACC_CONFIG_FILE="/stage/configs/single_gpu_accelerate.yaml"
              echo "[$(date)] Single GPU detected, using no-FSDP accelerate config"
            fi
            EFFECTIVE_MAX_SEQ_LEN=$((MAX_SEQ_LEN * PER_DEVICE_TRAIN_BATCH_SIZE))

            timestamp=$(date +"%Y%m%d_%H%M%S")
            OUTPUT_MODEL_PATH="${OUTPUT_DIR}/v0-${timestamp}"
            HF_OUTPUT_PATH="${OUTPUT_MODEL_PATH}-hf"
            EXPERIMENT_NAME="${SHORT_NAME}_${timestamp}"

            mkdir -p "${OUTPUT_MODEL_PATH}" 2>/dev/null || true

            echo "[$(date)] Starting SFT training"
            echo "[$(date)] Model: ${MODEL_PATH}"
            echo "[$(date)] Data: ${TOKENIZED_DATA_PATH}"
            echo "[$(date)] Output: ${OUTPUT_MODEL_PATH}"
            echo "[$(date)] GPUs: ${NUM_GPUS}"
            echo "[$(date)] Effective MAX_SEQ_LEN: ${MAX_SEQ_LEN} * ${PER_DEVICE_TRAIN_BATCH_SIZE} = ${EFFECTIVE_MAX_SEQ_LEN}"

            TRAIN_ARGS=(
              open_instruct/finetune.py
              --model_name_or_path "${MODEL_PATH}"
              --tokenized_data "${TOKENIZED_DATA_PATH}"
              --per_device_train_batch_size "${PER_DEVICE_TRAIN_BATCH_SIZE}"
              --gradient_accumulation_steps "${GRADIENT_ACCUMULATION_STEPS}"
              --learning_rate "${LR}"
              --lr_scheduler_type "${LR_SCHEDULER_TYPE}"
              --warmup_ratio "${WARMUP_RATIO}"
              --weight_decay "${WEIGHT_DECAY}"
              --clip_grad_norm "${CLIP_GRAD_NORM}"
              --num_train_epochs "${NUM_EPOCHS}"
              --max_seq_len "${EFFECTIVE_MAX_SEQ_LEN}"
              --reduce_loss "${REDUCE_LOSS}"
              --output_dir "${OUTPUT_MODEL_PATH}"
              --hf_dir "${HF_OUTPUT_PATH}"
              --checkpointing_steps "${CHECKPOINTING_STEPS}"
              --keep_last_n_checkpoints "${KEEP_LAST_N_CHECKPOINTS}"
              --logging_steps "${LOGGING_STEPS}"
              --exp_name "${EXPERIMENT_NAME}"
              --seed "${SEED}"
            )

            [[ "${USE_FLASH_ATTN}" == "true" ]] && TRAIN_ARGS+=(--use_flash_attn)
            [[ "${GRADIENT_CHECKPOINTING}" == "true" ]] && TRAIN_ARGS+=(--gradient_checkpointing)
            [[ "${USE_FAST}" == "true" ]] && TRAIN_ARGS+=(--use_fast)
            [[ "${PADFREE}" == "true" ]] && TRAIN_ARGS+=(--padfree)

            if [[ "${WITH_TRACKING}" == "true" ]]; then
              TRAIN_ARGS+=(--with_tracking --report_to "${REPORT_TO}")
              [[ -n "${WANDB_PROJECT}" ]] && TRAIN_ARGS+=(--wandb_project_name "${WANDB_PROJECT}")
            else
              TRAIN_ARGS+=(--no_push_to_hub --no_try_launch_beaker_eval_jobs)
            fi

            accelerate launch \
              --mixed_precision "${MIXED_PRECISION}" \
              --num_machines 1 \
              --num_processes "${NUM_GPUS}" \
              --machine_rank 0 \
              --main_process_ip localhost \
              --main_process_port 29500 \
              --config_file "${ACC_CONFIG_FILE}" \
              "${TRAIN_ARGS[@]}" 2>&1 | tee "${OUTPUT_MODEL_PATH}/training.log"

            echo "[$(date)] Training complete. Output at: ${OUTPUT_MODEL_PATH}"
            echo "[$(date)] HF export at: ${HF_OUTPUT_PATH}"
    monitors:
      skypilot_monitor:
        type: skypilot_monitor
        config:
          poll_interval_seconds: 30
          event_configs:
          - event_type: TERMINATE_EVENT
          #- event_type: MESSAGE_EVENT
            line_regex: "HFValidationError:"
            is_json: False
            event_fields:
              - field_name: msg
                field_regex: ".*"
          - event_type: TERMINATE_EVENT
          #- event_type: MESSAGE_EVENT
            line_regex: "ValueError:"
            is_json: False
            event_fields:
              - field_name: msg
                field_regex: ".*"
          - event_type: TERMINATE_EVENT
          #- event_type: MESSAGE_EVENT
            line_regex: "CUDA\\sout\\sof\\smemory" # torch.OutOfMemoryError: CUDA out of memory
            is_json: False
            event_fields:
              - field_name: msg
                field_regex: ".*"
          - event_type: WORKLOAD_STATUS_EVENT
            line_regex: "Step:\\s\\d+"
            event_fields:
              - field_name: status
                field_value_template: "RUNNING"
              - field_name: message
                field_regex: "Step:.+"
                is_data: True
          # Per-epoch HF checkpoint: matches paths containing -hf (e.g. .../v0-...-hf/epoch_hf_0/...)
          - event_type: NEWARTIFACT_IN_ENVIRONMENT_EVENT
            line_regex: "Special\\stokens\\sfile\\ssaved\\sin\\s.*-hf.*"
            is_json: False
            event_fields:
              - field_name: binding_id
                field_value_template: checkpoint
              - field_name: path
                field_regex: '/.+(?=/[^/]+/?$)'
                is_data: True
              - field_name: binding
                field_value_template: "{ \"path\": \"{{ fields.data.path }}\" }"
                is_json: True
          # Final checkpoint: matches paths NOT containing -hf/ (e.g. .../v0-20260621_114049/...)
          - event_type: NEWARTIFACT_IN_ENVIRONMENT_EVENT
            line_regex: "Special\\stokens\\sfile\\ssaved\\sin\\s(?!.*-hf/).+"
            is_json: False
            event_fields:
              - field_name: binding_id
                field_value_template: final
              - field_name: path
                field_regex: '/.+(?=/[^/]+/?$)'
                is_data: True
              - field_name: binding
                field_value_template: "{ \"path\": \"{{ fields.data.path }}\" }"
                is_json: True
