# YAML-driven equivalent of OneStepCPUDownloadTestConfig in
# test/integration/ibm/buildrunner/k8s/test_buildrunner_1step_cpu.py.
# build_yaml defaults to ./build.yaml (sibling) when omitted.
targets:
  - download_file
target_expectations:
  # Uses hf:// for both input and output, so step_count covers the download step
  # plus the auto-queued HF input-pull and output-push steps. (The GPU test now
  # uses the same hf:// flow and the same expected counts.)
  - target_name: download_file
    step_count: 5
    input_artifact_count: 1
    output_artifact_count: 1
    jobstats_count: 3
