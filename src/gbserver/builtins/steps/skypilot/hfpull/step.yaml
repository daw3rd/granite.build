name: hfpull
version: 1.0.0
type: upload
config:
  retry_enabled_default: true
  retry_transparently_default: true
  gb:
    step_contents_in_env: false
  workload:
    cwd: .
  hfpull_config:
    path: <path>
    uri: <uri>
    owner: ''
    repo: ''
    revision: ''
    hf:
      type: ''
  compute_config:
    total_memory_per_node: 10Gi
environment_configs:
  Skypilot:
    default_launcher: hfpull
    launchers:
      hfpull:
        type: skypilot
        monitors:
        - skypilot_monitor
        config:
          resources:
            cpus: 1+
          setup: |
            pip install --no-cache-dir 'huggingface_hub[cli]'
          run: |
            set -euo pipefail
            trap 'EC=$?; echo "hfpull failed at line $LINENO, exit code: $EC" >&2; exit $EC' ERR
            echo 'hfpull start'

            HF_DEST='{{ config.hfpull_config.path }}'
            HF_URI='{{ config.hfpull_config.uri }}'
            export HF_ENDPOINT='{{ config.hfpull_config.endpoint }}'
            HF_REPO='{{ config.hfpull_config.owner }}/{{ config.hfpull_config.repo }}'
            HF_REVISION='{{ config.hfpull_config.revision }}'
            HF_TYPE='{{ config.hfpull_config.hf.type }}'

            # Mocked iff the op (or "all") is listed in GBTEST_MOCKED_HF_OPS;
            # tolerant of spaces/case to match gbcommon.types.testing.hf_mocked_ops.
            hf_mocked() {
                local ops=",${GBTEST_MOCKED_HF_OPS:-},"
                ops=${ops// /}
                ops=${ops,,}
                case "$ops" in *,"$1",*|*,all,*) return 0 ;; *) return 1 ;; esac
            }
            if hf_mocked pull; then
                echo "[GBTEST_MOCKED_HF_OPS] mocking hfpull — skipping real download"
                mkdir -p "${HF_DEST}"
                echo mock > "${HF_DEST}/.gbtest_mock_hfpull"
                echo "Pulled HF URI: ${HF_URI} to path ${HF_DEST}"
                echo 'hfpull end'
                exit 0
            fi

            # No HF_TOKEN required: public repos download anonymously. When set,
            # `hf download` picks up HF_TOKEN from the env for private/gated repos.

            REVISION_FLAG=""
            if [ -n "${HF_REVISION}" ]; then
                REVISION_FLAG="--revision ${HF_REVISION}"
            fi

            REPO_TYPE_FLAG=""
            if [ -n "${HF_TYPE}" ]; then
                REPO_TYPE_FLAG="--repo-type ${HF_TYPE}"
            fi

            mkdir -p "${HF_DEST}"
            echo "Pulling HF URI: ${HF_URI} to path ${HF_DEST}"
            hf download "${HF_REPO}" --local-dir "${HF_DEST}" ${REVISION_FLAG} ${REPO_TYPE_FLAG}

            echo "Pulled HF URI: ${HF_URI} to path ${HF_DEST}"
            echo 'hfpull end'
    monitors:
      skypilot_monitor:
        type: skypilot_monitor
        config:
          poll_interval_seconds: 15
