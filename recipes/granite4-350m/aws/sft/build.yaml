######
# Open-Instruct SFT training on AWS p4d.24xlarge (8x A100 40GB) via SkyPilot.
#
# Prerequisites:
#   1. AWS credentials configured (~/.aws/credentials) with us-east-2 access
#   2. SkyPilot installed and verified: sky check aws
#   3. ECR docker password exported:
#      export GBSERVER_SECRET_SKYPILOT_DOCKER_PASSWORD=$(aws ecr get-login-password --region us-east-2)
#   4. S3 buckets accessible:
#      - s3://granite-build-datasets/tokenized/8192/data_filtered (training data)
#      - s3://granite-build-checkpoints (checkpoint output)
#   5. vCPU quota for P-family instances >= 96 in us-east-2
#
# Usage:
#   export GBSERVER_SECRET_SKYPILOT_DOCKER_PASSWORD=$(aws ecr get-login-password --region us-east-2)
#   gb build start -f samples/standalone/openinstruct-sft/build.yaml --param NAME=oisft001
######
granite.build:
  name: $${NAME}
  targets:
    sft-training:
      environment_uri: space://environments/skypilot/aws
      inputs:
        model:
          uri: "hf:///ibm-granite/granite-4.0-350m-base"
          type: model
      outputs:
        checkpoint:
          uri: "env://{{ binding.path }}"
          type: model
        final:
          uri: "env://{{ binding.path }}"
          type: model
      steps:
        - step_uri: space://steps/openinstruct-sft
          config:
            launcher_config:
              resources:
                #accelerators: "L40S:8"
                #accelerators: "L40S:4"
                #accelerators: "A10G:4"
                accelerators: "A100:8"
              docker:
                # Override host AMI for A100 (p4d) instances. SkyPilot's default
                # AMI has driver 535 which is broken on kernel 6.8 (cuInit error 802).
                # This DL Base AMI (20260619) ships with driver 550+.
                host_image_id: "ami-0cc52c70f2edeb6c6"
            compute_config:
              num_nodes: 1
              num_gpus_per_node: 8
              #num_gpus_per_node: 4
              #num_gpus_per_node: 1
            sft_config:
              build_name: "$${NAME}"
              model_path: "{{ bindings.model.binding.path }}"
              dataset_s3_uri: "s3://granite-build-datasets/tokenized/8192/data_filtered"
              #dataset_s3_uri: "s3://granite-build-datasets/tokenized/8192/data_filtered_10k"
              checkpoint_s3_uri: "s3://granite-build-checkpoints"
              num_epochs: "3"
              #per_device_train_batch_size: "1"
              #gradient_accumulation_steps: "16"
              #per_device_train_batch_size: "2"
              #gradient_accumulation_steps: "8"
              per_device_train_batch_size: "2"
              gradient_accumulation_steps: "8"

    multilingual-evals:
      environment_uri: space://environments/skypilot/aws
      inputs:
        model_checkpoint:
          binding: sft-training.checkpoint
      outputs: {}
      steps:
        - step_uri: space://steps/sage-eval-multilingual-grouped
          retry_enabled: true
          retry_transparently: true
          config:
            sage_eval_config:
              model_source_s3: "s3://granite-build-checkpoints{{ bindings.model_checkpoint.binding.path | replace('/output', '') }}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}-{{ bindings.model_checkpoint.binding.path.split('/')[-1] | replace('epoch_hf_', 'e') | replace('step_hf_', 's') }}"

    bcb-generate:
      environment_uri: space://environments/skypilot/aws
      inputs:
        model_checkpoint:
          binding: sft-training.checkpoint
      outputs:
        checkpoint:
          uri: "env://{{ binding.path }}"
          type: model
        predictions:
          uri: "env://{{ binding.path }}"
          type: dataset
      steps:
        - step_uri: space://steps/sage-eval-bcb-generate
          config:
            sage_eval_config:
              model_source_s3: "s3://granite-build-checkpoints{{ bindings.model_checkpoint.binding.path | replace('/output', '') }}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}-{{ bindings.model_checkpoint.binding.path.split('/')[-1] | replace('epoch_hf_', 'e') | replace('step_hf_', 's') }}"

    bcb-execute:
      environment_uri: space://environments/skypilot/aws
      inputs:
        checkpoint:
          binding: bcb-generate.checkpoint
      outputs: {}
      steps:
        - step_uri: space://steps/sage-eval-bcb-execute
          retry_enabled: true
          retry_transparently: true
          config:
            sage_eval_config:
              model_source_s3: "s3://{{ bindings.checkpoint.binding.path | replace('/s3path/', '') }}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}-{{ bindings.checkpoint.binding.path.split('/')[-1] | replace('epoch_hf_', 'e') | replace('step_hf_', 's') }}"
              oe_eval_bcb_api_url: "http://localhost:7860/evaluate/"

    bfcl:
      environment_uri: space://environments/skypilot/aws
      inputs:
        model_checkpoint:
          binding: sft-training.final
      outputs: {}
      steps:
        - step_uri: space://steps/bfcl-eval
          retry_enabled: true
          retry_transparently: true
          config:
            bfcl_config:
              model_source_s3: "s3://granite-build-checkpoints{{ bindings.model_checkpoint.binding.path | replace('/output', '') }}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}-final"
