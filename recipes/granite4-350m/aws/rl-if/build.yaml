######
# IF (Instruction Following) RL training on AWS g6e.48xlarge (8x L40S)
# with RM sidecar + Code server sidecar.
#
# GPU allocation:
#   GPUs 0-6: Training (3 learners + 4 vLLM engines)
#   GPU 7:    RM server sidecar
#   CPU:      Code server sidecar
#
# Prerequisites:
#   1. AWS credentials configured
#   2. ECR docker password exported:
#      export GBSERVER_SECRET_SKYPILOT_DOCKER_PASSWORD=$(aws ecr get-login-password --region us-east-2)
#   3. Model checkpoint on S3
#   4. RM model at s3://granite-build-checkpoints/rm-models/phi4-multilingual/
#   5. mix16_if dataset at s3://granite-build-datasets/rlhf/mix16_if/
#
# Usage:
#   gb build start -f recipes/granite4-350m/aws/rl-if/build.yaml \
#     --param NAME=g4-350m-sft-8k-8-e3 \
#     --param MODEL_S3=s3://granite-build-checkpoints/rl/g4-350m-sft-8k-8-e3-identity/exp_12/iter1/rlvr/step_400
######
granite.build:
  name: $${NAME}
  targets:
    rl-if:
      environment_uri: space://environments/skypilot/aws
      inputs: {}
      outputs:
        checkpoint:
          uri: "env://{{ binding.path }}"
          type: model
        final:
          uri: "env://{{ binding.path }}"
          type: model
      steps:
        - step_uri: space://steps/openinstruct-rl
          config:
            rl_config:
              exp_name: "$${NAME}-if"
              run_name: "$${NAME}-if"
              model_source_s3: "$${MODEL_S3}"
              data_source_s3: "s3://granite-build-datasets/rlhf/mix16_if"
              output_subdir: "$${NAME}-if/exp_32/iter1/rlvr"
              checkpoint_state_subdir: "$${NAME}-if/exp_32/iter1/rlvr/_state"
              temperature: "1.0"
              temp_final: "1.0"
              total_episodes: "500000"
              save_freq: "80"
              eval_freq: "80"
              checkpoint_state_freq: "80"
              ref_policy_update_freq: "32"
              add_general_reward: "true"
              code_server_url: "http://localhost:8001"

    multilingual-evals:
      environment_uri: space://environments/skypilot/aws
      inputs:
        model_checkpoint:
          binding: rl-if.checkpoint
      outputs: {}
      steps:
        - step_uri: space://steps/sage-eval-multilingual-grouped
          retry_enabled: true
          retry_transparently: true
          config:
            sage_eval_config:
              model_source_s3: "s3://granite-build-checkpoints{{ bindings.model_checkpoint.binding.path | replace('/output', '') }}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}-if-{{ bindings.model_checkpoint.binding.path.split('/')[-1] }}"

    bfcl:
      environment_uri: space://environments/skypilot/aws
      inputs:
        model_checkpoint:
          binding: rl-if.final
      outputs: {}
      steps:
        - step_uri: space://steps/bfcl-eval
          retry_enabled: true
          retry_transparently: true
          config:
            bfcl_config:
              model_source_s3: "s3://granite-build-checkpoints{{ bindings.model_checkpoint.binding.path | replace('/output', '') }}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}-if-final"
