######
# Run all 26 evals (25 sage + 1 BFCL) on AWS L40S via SkyPilot.
#
# Equivalent to: ./skypilot/run_all_evals.sh <checkpoint_path> <experiment>
#
# NOTE: BigCodeBench is NOT included — launch separately with:
#   gb build start -f samples/standalone/sage-eval-bcb/build.yaml \
#     --param NAME=<experiment> --param MODEL_S3=<s3_path>
#
# This build launches 22 SkyPilot clusters in parallel:
#   - 11 OLMES evals (general, math, cruxeval) — sage-py311-olmes image
#   - 7 CODE evals (evalplus, multiple_*) — sage-py311-code image
#   - 2 SAFETY evals (attaq, salad-bench) — sage-py311-safety image
#   - 5 MULTILINGUAL evals (grouped on 1 instance) — sage-py311-multilingual image
#   - 1 BFCL eval — bfcl-py311 image
#
# vCPU budget: 22 x g6e.xlarge (4 vCPU) = 88 vCPUs
# Fits within 192 vCPU quota for "Running On-Demand G and VT instances"
#
# Prerequisites:
#   1. AWS credentials configured (~/.aws/credentials) with us-east-2 access
#   2. SkyPilot installed and verified: sky check aws
#   3. ECR docker password exported:
#      export GBSERVER_SECRET_SKYPILOT_DOCKER_PASSWORD=$(aws ecr get-login-password --region us-east-2)
#   4. S3 buckets accessible:
#      - Model checkpoint (e.g. s3://granite-build-checkpoints/sft/v0-20260614_093520-hf/step_hf_7500)
#      - s3://granite-build-eval-results (eval output)
#   5. vCPU quota for G-family instances >= 88 in us-east-2
#
# Usage:
#   export GBSERVER_SECRET_SKYPILOT_DOCKER_PASSWORD=$(aws ecr get-login-password --region us-east-2)
#   gb build start -f samples/standalone/run-all-evals/build.yaml \
#     --param NAME=eval-l40s-350m-s7500 \
#     --param MODEL_S3=s3://granite-build-checkpoints/sft/v0-20260614_093520-hf/step_hf_7500
#
# Monitor:
#   gb build list
#   gb build logs <build-id>
######
granite.build:
  name: $${NAME}
  targets:

    # ═══════════════════════════════════════════════════════════════════════════
    # OLMES image evals (11) — sage-py311-olmes:0.025
    # ═══════════════════════════════════════════════════════════════════════════

    code-olmes-cruxeval:
      environment_uri: space://environments/skypilot/aws
      inputs: {}
      outputs: {}
      steps:
        - step_uri: space://steps/sage-eval
          config:
            sage_eval_config:
              gb_script: "code_olmes_cruxeval_slim.sh"
              model_source_s3: "$${MODEL_S3}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}"

