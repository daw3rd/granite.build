######
# Run all 5 multilingual evals on a single AWS g6e.xlarge (1x L40S 48GB) via SkyPilot.
#
# Evals included:
#   - multilingual-global-mmlu
#   - multilingual-mgsm
#   - multilingual-include-ar-de-es-fr
#   - multilingual-include-hi-bn-ta-te
#   - multilingual-include-it-ja-ko-nl-pt-zh
#
# Prerequisites:
#   1. AWS credentials configured (~/.aws/credentials) with us-east-2 access
#   2. SkyPilot installed and verified: sky check aws
#   3. ECR docker password exported:
#      export GBSERVER_SECRET_SKYPILOT_DOCKER_PASSWORD=$(aws ecr get-login-password --region us-east-2)
#   4. S3 buckets accessible:
#      - Model checkpoint source (e.g. s3://granite-build-checkpoints/<run>/final)
#      - s3://granite-build-eval-results (eval output)
#   5. vCPU quota for G-family instances >= 4 in us-east-2
#
# Usage:
#   export GBSERVER_SECRET_SKYPILOT_DOCKER_PASSWORD=$(aws ecr get-login-password --region us-east-2)
#   gb build start -f samples/standalone/sage-eval-multilingual/build.yaml \
#     --param NAME=eval-ml-001 \
#     --param MODEL_S3=s3://granite-build-checkpoints/oisft001/final
######
granite.build:
  name: $${NAME}
  targets:
    multilingual-evals:
      environment_uri: space://environments/skypilot/aws
      inputs: {}
      outputs: {}
      steps:
        - step_uri: space://steps/sage-eval-multilingual-grouped
          config:
            sage_eval_config:
              model_source_s3: "$${MODEL_S3}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}"
