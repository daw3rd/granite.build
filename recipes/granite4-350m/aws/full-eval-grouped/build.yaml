######
# Run all 26 evals (25 sage + 1 BFCL) on just 5 AWS spot instances via SkyPilot.
#
# This is the cost-optimized version of run-all-evals that groups evals by category
# onto single instances instead of launching one per eval:
#   - 1 instance: 11 OLMES evals (sage-py311-olmes image)
#   - 1 instance: 7 CODE evals (sage-py311-code image)
#   - 1 instance: 2 SAFETY evals (sage-py311-safety image)
#   - 1 instance: 5 MULTILINGUAL evals (sage-py311-multilingual image)
#   - 1 instance: 1 BFCL eval (bfcl-py311 image)
#
# vCPU budget: 5 x g6e.xlarge (4 vCPU) = 20 vCPUs (vs 88 for ungrouped)
# Trade-off: Runs longer (sequential within group) but uses 77% fewer instances.
#
# NOTE: BigCodeBench is NOT included — launch separately with:
#   gb build start -f samples/standalone/sage-eval-bcb/build.yaml \
#     --param NAME=<experiment> --param MODEL_S3=<s3_path>
#
# Prerequisites:
#   1. AWS credentials configured (~/.aws/credentials) with us-east-2 access
#   2. SkyPilot installed and verified: sky check aws
#   3. ECR docker password exported:
#      export GBSERVER_SECRET_SKYPILOT_DOCKER_PASSWORD=$(aws ecr get-login-password --region us-east-2)
#   4. S3 buckets accessible:
#      - Model checkpoint (e.g. s3://granite-build-checkpoints/sft/v0-20260614_093520-hf/step_hf_7500)
#      - s3://granite-build-eval-results (eval output)
#   5. vCPU quota for G-family instances >= 20 in us-east-2
#
# Usage:
#   export GBSERVER_SECRET_SKYPILOT_DOCKER_PASSWORD=$(aws ecr get-login-password --region us-east-2)
#   gb build start -f samples/standalone/run-all-evals-grouped/build.yaml \
#     --param NAME=eval-l40s-350m-s7500 \
#     --param MODEL_S3=s3://granite-build-checkpoints/sft/v0-20260614_093520-hf/step_hf_7500
######
granite.build:
  name: $${NAME}
  targets:

    # ═══════════════════════════════════════════════════════════════════════════
    # OLMES evals (11 grouped on 1 instance) — sage-py311-olmes:0.025
    # ═══════════════════════════════════════════════════════════════════════════

    olmes-grouped:
      environment_uri: space://environments/skypilot/aws
      inputs: {}
      outputs: {}
      steps:
        - step_uri: space://steps/sage-eval-olmes-grouped
          config:
            sage_eval_config:
              model_source_s3: "$${MODEL_S3}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}"

    # ═══════════════════════════════════════════════════════════════════════════
    # CODE evals (7 grouped on 1 instance) — sage-py311-code:0.025
    # ═══════════════════════════════════════════════════════════════════════════

    code-grouped:
      environment_uri: space://environments/skypilot/aws
      inputs: {}
      outputs: {}
      steps:
        - step_uri: space://steps/sage-eval-code-grouped
          config:
            sage_eval_config:
              model_source_s3: "$${MODEL_S3}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}"

    # ═══════════════════════════════════════════════════════════════════════════
    # SAFETY evals (2 grouped on 1 instance) — sage-py311-safety:0.025
    # ═══════════════════════════════════════════════════════════════════════════

    safety-grouped:
      environment_uri: space://environments/skypilot/aws
      inputs: {}
      outputs: {}
      steps:
        - step_uri: space://steps/sage-eval-safety-grouped
          config:
            sage_eval_config:
              model_source_s3: "$${MODEL_S3}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}"

    # ═══════════════════════════════════════════════════════════════════════════
    # MULTILINGUAL evals (5 grouped on 1 instance) — sage-py311-multilingual:0.025
    # ═══════════════════════════════════════════════════════════════════════════

    multilingual-grouped:
      environment_uri: space://environments/skypilot/aws
      inputs: {}
      outputs: {}
      steps:
        - step_uri: space://steps/sage-eval-multilingual-grouped
          config:
            sage_eval_config:
              model_source_s3: "$${MODEL_S3}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}"

    # ═══════════════════════════════════════════════════════════════════════════
    # BFCL eval (1) — bfcl-py311:0.02
    # ═══════════════════════════════════════════════════════════════════════════

    bfcl:
      environment_uri: space://environments/skypilot/aws
      inputs: {}
      outputs: {}
      steps:
        - step_uri: space://steps/bfcl-eval
          config:
            bfcl_config:
              model_source_s3: "$${MODEL_S3}"
              eval_results_s3: "s3://granite-build-eval-results"
              experiment: "$${NAME}"
