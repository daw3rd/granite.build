# Identity-RL full recipe — the complete Identity RL run.
# Reproduces gbansible run_rl_bluevela_identity.sh: RM server (no code server),
# same GRPO config, full training length (no smoke overrides). Override any
# value with: gb build start --param KEY=VALUE
# Values mirror gbansible vars/rl/identityrl.yml plus the
# run_rl_bluevela_identity.sh -e overrides (temperature=1.15, total_episodes=300000,
# *_freq=40, ref=8, add_general_reward=false).

# ─── Run identification ───────────────────────────────────────────────
# -identity suffix mirrors the source script's EXP_IDENTITY="${EXPERIMENT}-identity".
EXP_NAME: "granite4-350m-openinstruct-epoch-hf-2-identity"
RUN_NAME: "granite4-350m-openinstruct-epoch-hf-2-identity"
RL_NAME: "identity"

# ─── Model + data ─────────────────────────────────────────────────────
# Identity RL takes an IFRL output checkpoint as its starting point.
MODEL_PATH: "/proj/granite-build/g4os/skypilot-test/RLHF/outputs/granite4-350m-openinstruct-epoch-hf-2/step_480"
DATASET_MIXER: '{"/proj/granite-build/g4os/RLHF/data/long_context/general_data/general_identity/train.jsonl":1.0}'
DATASET_EVAL_MIXER: '{"/proj/granite-build/g4os/RLHF/data/long_context/general_data/general_identity/validation.jsonl":1.0}'

# ─── Output  ─────────────
OUTPUT_DIR: "/proj/granite-build/g4os/skypilot-test/RLHF/outputs/granite4-350m-openinstruct-epoch-hf-2-identityrl/"
CHECKPOINT_STATE_DIR: "/proj/granite-build/g4os/skypilot-test/RLHF/outputs/granite4-350m-openinstruct-epoch-hf-2-identityrl/_state"

# ─── Full-run training length (run_rl_bluevela_identity.sh -e overrides) ─
TOTAL_EPISODES: "120000"
SAVE_FREQ: "20"
EVAL_FREQ: "20"
CHECKPOINT_STATE_FREQ: "20"
REF_POLICY_UPDATE_FREQ: "8"

# ─── 8-GPU topology ────
NUM_LEARNERS_PER_NODE: "4"
VLLM_NUM_ENGINES: "4"
VLLM_TENSOR_PARALLEL_SIZE: "1"

# ─── Identity-RL deltas from the source config ────────────────────────
TEMPERATURE: "1.15"
TEMP_FINAL: "1.15"
ADD_GENERAL_REWARD: "false"

# ─── Servers (RM only — identity RL has no code server) ───────────────
RM_SERVER_MODEL: "/proj/checkpoints/ashishagr/model_downloads/phi4-multilingual"
RM_IDLE_TIMEOUT: ""
RM_ACCELERATORS: "H100:1"
RM_MEMORY: "128"

# ─── Infrastructure ───────────────────────────────────────────────────
CLUSTER: "bluevela"
RL_QUEUE: "normal"
RL_ACCELERATORS: "H100:8"
RL_MEMORY: "1580"

# ─── GRPO defaults (step single-node defaults; override as needed) ────
BETA: "0.05"
NUM_UNIQUE_PROMPTS_ROLLOUT: "64"
NUM_SAMPLES_PER_PROMPT_ROLLOUT: "16"
CLIPRANGE_LOW: "0.2"
CLIPRANGE_HIGH: "0.28"
DEEPSPEED_STAGE: "3"
SEED: "42"
PAD_TOKEN_ID: "6"
PER_DEVICE_TRAIN_BATCH_SIZE: "2"
LEARNING_RATE: "5e-7"
MAX_PROMPT_TOKEN_LENGTH: "512"
RESPONSE_LENGTH: "8192"
KL_ESTIMATOR: "kl3"
PACK_LENGTH: "8704"
THINKING: "4"
NUM_EPOCHS: "1"
WARMUP_RATIO: "0.0"
NUM_MINI_BATCHES: "1"
N_GRAM: "3"
ALLOWED_FREQ: "2"
TEMP_CHANGE_INTERVAL: "10"
ENTROPY_COEFF: "0.0"
VLLM_IMP_RATIO_CAP: "-1"
GRADIENT_CHECKPOINTING: "true"
ASYNC_MODE: "true"
APPLY_THINKING_FORMAT_REWARD: "true"
APPLY_VERIFIABLE_REWARD: "true"
NON_STOP_PENALTY: "true"
APPLY_REPETITION_PENALTY: "true"
SET_WEIGHT_DECAY_ON_BIAS_AND_NORM: "false"
ADDITIVE_FORMAT_REWARD: "false"
FILTER_ZERO_ADVANTAGE: "false"
WITH_TRACKING: "false"
GROUND_TRUTHS_KEY: "ground_truth"
SFT_MESSAGES_KEY: "messages"
DATASET_TRAIN_SPLITS: "train"
DATASET_EVAL_SPLITS: "train"
STOP_STRINGS: '"<|end_of_text|>" "<｜end▁of▁sentence｜>" "<|EOT|>" "<|endoftext|>" "<|im_end|>"'
IMPORTANCE_SAMPLING_LEVEL: "token"
ADVANTAGE_NORMALIZATION_TYPE: "group_standard"
ITERATOR_TYPE: "random"
LR_SCHEDULER_TYPE: "linear"
LOSS_MODE: "vanilla"
TEMP_SCHEDULE_TYPE: "constant"
DATASET_LOCAL_CACHE_DIR: "/proj/granite-build/g4os/data_downloads/"
TORCHDYNAMO_DISABLE: "false"
